name = "grocery-store"
main = "src/index.ts"
compatibility_date = "2025-05-06"

[[d1_databases]]
binding = "DB"
database_name = "grocery-store-db"
database_id = "" # fill in after: wrangler d1 create dinner-planner-db

[vars]
ENABLE_OAUTH = "false"

# Secrets (never put values here — set via: wrangler secret put <NAME>)
# DEV_TOKEN
# DEV_USER_ID
# GITHUB_CLIENT_ID
# GITHUB_CLIENT_SECRET
# JWT_SECRET
